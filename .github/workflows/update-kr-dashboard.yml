name: Update KR Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "50 22 * * *"
    - cron: "0-55/5 23 * * 0-4"
    - cron: "0-55/5 0-10 * * 1-5"
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib openpyxl

      - name: Show trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow=${{ github.workflow }}"
          echo "ref=${{ github.ref }}"
          date

      - name: Ensure directories
        run: |
          mkdir -p data
          mkdir -p config
          mkdir -p scripts

      - name: Run KR real pipeline
        run: |
          python ./scripts/check_schedule_window.py --now
          python ./scripts/run_kr_pipeline.py

      - name: Show generated files
        run: |
          ls -la ./data
          python - <<'PY'
          import json
          from pathlib import Path

          for name in [
              "latest_krx.json",
              "market_raw.json",
              "leader_board.json",
              "sector_calendar_history.json",
              "dashboard_meta.json",
          ]:
              path = Path("data") / name
              if path.exists():
                  print(f"[OK] {name}: {path.stat().st_size} bytes")
              else:
                  print(f"[MISSING] {name}")
          PY

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json config/scoring_config.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update KR dashboard data"
          git push
