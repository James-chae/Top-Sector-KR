name: Update KR Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "55 22 * * 0-4"
    - cron: "*/5 23 * * 0-4"
    - cron: "*/5 0-10 * * 1-5"
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: top-sector-kr-data
  cancel-in-progress: false

jobs:
  update-kr-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml openpyxl html5lib

      - name: Show current UTC time
        run: |
          date -u

      - name: Ensure config file exists
        run: |
          if [ ! -f "config/섹터_마스터.xlsx" ]; then
            echo "config/섹터_마스터.xlsx not found"
            exit 1
          fi

      - name: Run KR pipeline
        run: |
          python scripts/run_kr_pipeline.py

      - name: Show generated files
        run: |
          ls -la data
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              Path("data/latest_krx.json"),
              Path("data/market_raw.json"),
              Path("data/leader_board.json"),
              Path("data/sector_calendar_history.json"),
          ]

          for path in files:
              print("=" * 60)
              print(path)
              if path.exists():
                  data = json.loads(path.read_text(encoding="utf-8"))
                  print("exists: yes")
                  if isinstance(data, dict):
                      print("top keys:", list(data.keys())[:10])
              else:
                  print("exists: no")
          PY

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update KR dashboard data"
          git push
