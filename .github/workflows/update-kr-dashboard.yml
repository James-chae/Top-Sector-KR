name: Update KR Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "50 22 * * *"         # KST 07:50
    - cron: "3-58/5 23 * * 0-4"   # KST 08:03~08:58
    - cron: "3-58/5 0-10 * * 1-5" # KST 09:03~19:58
    - cron: "3 11 * * 1-5"        # KST 20:03

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib openpyxl

      - name: Show trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow=${{ github.workflow }}"
          echo "ref=${{ github.ref }}"
          date

      - name: Ensure directories
        run: |
          mkdir -p data
          mkdir -p scripts

      - name: Check schedule window
        id: schedule_check
        run: |
          RESULT=$(python ./scripts/check_schedule_window.py --now --machine)
          echo "$RESULT"
          SHOULD_RUN=$(echo "$RESULT" | grep '^should_run_pipeline=' | cut -d'=' -f2)
          SESSION_STATE=$(echo "$RESULT" | grep '^session_state=' | cut -d'=' -f2)
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "session_state=$SESSION_STATE" >> $GITHUB_OUTPUT

      - name: Run KR real pipeline
        if: github.event_name == 'workflow_dispatch' || steps.schedule_check.outputs.should_run == 'true'
        run: |
          python ./scripts/run_kr_pipeline.py

      - name: Skip pipeline outside allowed window
        if: github.event_name == 'schedule' && steps.schedule_check.outputs.should_run != 'true'
        run: |
          echo "Skip pipeline: outside allowed window"
          echo "session_state=${{ steps.schedule_check.outputs.session_state }}"

      - name: Show generated files
        if: github.event_name == 'workflow_dispatch' || steps.schedule_check.outputs.should_run == 'true'
        run: |
          ls -la ./data
          python - <<'PY'
          from pathlib import Path

          for name in [
              "latest_krx.json",
              "market_raw.json",
              "leader_board.json",
              "sector_calendar_history.json",
              "dashboard_meta.json",
          ]:
              path = Path("data") / name
              if path.exists():
                  print(f"[OK] {name}: {path.stat().st_size} bytes")
              else:
                  print(f"[MISSING] {name}")
          PY

      - name: Commit and push data updates
        if: github.event_name == 'workflow_dispatch' || steps.schedule_check.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json config/scoring_config.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update KR dashboard data"
          git push