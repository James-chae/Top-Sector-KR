<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Sector KR</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-card panel">
        <div>
          <h1>주도주 레이다</h1>
          <p class="sub">한국 전용 · 오늘의 주도섹터 / 오늘의 주도주 / 주도섹터 달력</p>
        </div>
        <div class="topbar-right">
          <div class="chip"><span class="dot"></span><span id="krClock">KR --:--:--</span></div>
          <button id="refreshBtn" class="refresh-btn">새로고침</button>
        </div>
      </div>
    </header>

    <section class="hero-grid">
      <div class="panel hero-card">
        <div class="hero-label">기준일</div>
        <div id="heroTradeDate" class="hero-value">-</div>
        <div id="heroSession" class="hero-sub">-</div>
      </div>
      <div class="panel hero-card">
        <div class="hero-label">상위 주도섹터 수</div>
        <div id="heroSectorCount" class="hero-value">-</div>
        <div id="heroMarketBias" class="hero-sub">-</div>
      </div>
      <div class="panel hero-card">
        <div class="hero-label">오늘의 주도주 수</div>
        <div id="heroLeaderCount" class="hero-value">-</div>
        <div id="heroFilteredEtf" class="hero-sub">-</div>
      </div>
      <div class="panel hero-card">
        <div class="hero-label">최근 기록일수</div>
        <div id="heroHistoryCount" class="hero-value">-</div>
        <div id="heroUpdatedAt" class="hero-sub">-</div>
      </div>
    </section>

    <nav class="main-tabs">
      <button class="tab-btn active" data-tab="dashboard">주도주</button>
      <button class="tab-btn" data-tab="calendar">주도섹터달력</button>
    </nav>

    <main>
      <section id="screen-dashboard" class="screen active">
        <div class="dashboard-grid">
          <div class="main-col">
            <section class="panel">
              <div class="section-head">
                <div>
                  <h2>오늘의 주도주</h2>
                  <p class="sub">거래대금 + 등락률 중심</p>
                </div>
              </div>
              <div id="leadersList" class="list-wrap"></div>
            </section>
          </div>

          <div class="side-col">
            <section class="panel">
              <div class="section-head">
                <div>
                  <h2>오늘의 주도섹터</h2>
                  <p class="sub">점수 상위 섹터</p>
                </div>
              </div>
              <div id="sectorCards" class="sector-wrap"></div>
            </section>
          </div>
        </div>
      </section>

      <section id="screen-calendar" class="screen">
        <div class="calendar-layout">
          <div class="main-col">
            <section class="panel">
              <div class="section-head">
                <div>
                  <h2>주도섹터 달력</h2>
                  <p class="sub">최근 누적 기록 기준 · 월~금 표시</p>
                </div>
                <div class="calendar-nav">
                  <button id="prevMonthBtn" class="nav-btn">◀ 이전달</button>
                  <button id="todayMonthBtn" class="nav-btn">오늘</button>
                  <button id="nextMonthBtn" class="nav-btn">다음달 ▶</button>
                </div>
              </div>
              <div class="calendar-headline" id="calendarMonthLabel">-</div>
              <div class="weekday-grid" id="weekdayGrid"></div>
              <div class="calendar-grid" id="calendarGrid"></div>
            </section>
          </div>

          <div class="side-col">
            <section class="panel">
              <div class="section-head">
                <div>
                  <h2>최근 10일 섹터 카운트</h2>
                  <p class="sub">80점 이상 기준</p>
                </div>
              </div>
              <div id="recentCounts" class="count-wrap"></div>
            </section>

            <section class="panel">
              <div class="section-head">
                <div>
                  <h2>오늘의 주도섹터 요약</h2>
                  <p class="sub">달력 기준 요약</p>
                </div>
              </div>
              <div id="todaySectorSummary" class="count-wrap"></div>
            </section>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
